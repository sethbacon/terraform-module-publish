name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  build-test:
    name: Lint, test, dist sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: Rebuild bundle and fail if dist is stale
        run: |
          npm run build
          if ! git diff --exit-code -- dist/index.js; then
            echo "::error::dist is out of date — run 'npm run build' and commit the result."
            exit 1
          fi
