---
name: PR Checks

on:
  pull_request:
    branches: [main]
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  conventional-title:
    name: Conventional PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows Conventional Commits
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            perf
            test
            build
            ci
            chore
            revert
            deps
            security
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: >-
            The PR title must have a non-empty description after the type
            (e.g. "feat: add drift-report retries", not "feat:").

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Dependency Review
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
